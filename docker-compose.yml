services:
  mysql:
    image: mysql:8.0
    container_name: financeflow_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financeflow
      MYSQL_USER: financeflow
      MYSQL_PASSWORD: financeflow123
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - financeflow_network

  api:
    build: ./apps/api
    container_name: financeflow_api
    restart: always
    depends_on:
      - mysql
    environment:
      PORT: 3333
      NODE_ENV: development
      JWT_SECRET: sua_chave_secreta_super_segura_aqui
      JWT_EXPIRES_IN: 7d
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: financeflow
      DB_PASS: financeflow123
      DB_NAME: financeflow
    ports:
      - '3333:3333'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - financeflow_network

  web:
    build: ./apps/web
    container_name: financeflow_web
    restart: always
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3333/api
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - financeflow_network

volumes:
  mysql_data:

networks:
  financeflow_network:
    driver: bridge
