services:
  postgres:
    image: postgres:16-alpine
    container_name: financeflow_db
    restart: always
    environment:
      POSTGRES_DB: financeflow
      POSTGRES_USER: financeflow
      POSTGRES_PASSWORD: financeflow123
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeflow_network

  api:
    build:
      context: ./apps/api
      target: development
    container_name: financeflow_api
    restart: always
    depends_on:
      - postgres
    environment:
      PORT: 3333
      NODE_ENV: development
      JWT_SECRET: sua_chave_secreta_super_segura_aqui
      JWT_EXPIRES_IN: 7d
      WEB_URL: ${WEB_URL:-http://localhost:5173}
      DB_MIGRATIONS_RUN: true
      DEMO_SEED_ON_STARTUP: true
      DEMO_USER_EMAIL: demo@financeflow.dev
      DEMO_USER_PASSWORD: FinanceFlow@2026
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: financeflow
      DB_PASS: financeflow123
      DB_NAME: financeflow
    ports:
      - '3333:3333'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - financeflow_network

  web:
    build: ./apps/web
    container_name: financeflow_web
    restart: always
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3333/api}
      VITE_DEMO_EMAIL: demo@financeflow.dev
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - financeflow_network

volumes:
  postgres_data:

networks:
  financeflow_network:
    driver: bridge
